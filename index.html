      if (slotDef.food > 0 && slotDef.threat > 0) {
        const sep = document.createElement('span');
        sep.className = 'cost-sep';
        sep.textContent = '+';
        costEl.appendChild(sep);
      }
      if (slotDef.threat > 0) costEl.appendChild(buildCostPip('threat', slotDef.threat));
    }
    col.appendChild(costEl);

    const lootZone = document.createElement('div');
    lootZone.className = 'loot-zone' + (slotDef.reserved ? ' reserved' : '');

    // Only non-reserved slots get a click handler
    if (!slotDef.reserved) {
      lootZone.addEventListener('click', async () => {
        if (!lootZone.classList.contains('has-card')) return;
        if (lootZone.classList.contains('locked')) return;
        if (cardSelected) return;
        await onCardSelected(index);
      });
    }

    const lootIcon = document.createElement('span');
    lootIcon.className = 'loot-icon';
    lootIcon.textContent = '📦';
    lootZone.appendChild(lootIcon);
    const lootLabel = document.createElement('div');
    lootLabel.className = 'loot-label';
    lootLabel.textContent = slotDef.reserved ? 'reserved' : 'loot';
    lootZone.appendChild(lootLabel);
    col.appendChild(lootZone);
    lootZones.push(lootZone);

    return col;
  }

  const slotsRow = document.getElementById('slots-row');
  SLOTS.forEach((slot, i) => {
    slotsRow.appendChild(buildSlot(slot, i));
    if (SEPARATORS_AFTER.has(i)) {
      const sep = document.createElement('div');
      sep.className = 'slot-separator';
      slotsRow.appendChild(sep);
    }
  });

  /* ── Discard cards from draw pile for movement, reshuffling if needed ── */
  function discardForMovement(count) {
    if (count <= 0) return [];
    const discarded = [];
    let remaining = count;
    while (remaining > 0) {
      if (drawPile.length === 0) {
        // Reshuffle
        drawPile = shuffle([...fullDeck]);
        deckLaps++;
      }
      discarded.push(drawPile.splice(0, 1)[0]);
      remaining--;
    }
    return discarded;
  }

  async function loadDeck() {
    const countEl = document.getElementById('deck-count');
    const drawBtn = document.getElementById('draw-btn');
    try {
      countEl.textContent = 'Loading deck…';
      const res = await fetch('loot-deck.json');
      if (!res.ok) throw new Error(`HTTP ${res.status} — is loot-deck.json in the same folder?`);
      const data = await res.json();
      if (!data.loot_deck || !Array.isArray(data.loot_deck)) throw new Error('Unexpected JSON structure');
      fullDeck = data.loot_deck;
      drawPile = shuffle(fullDeck);
      updateDeckCount();
    } catch (e) {
      countEl.textContent = `⚠ ${e.message}`;
      countEl.style.color = '#c94040';
      drawBtn.disabled = true;
    }
  }

  document.getElementById('draw-btn').addEventListener('click', () => {
    if (drawPile.length < DRAW_SLOTS) return;
    const drawn = drawPile.splice(0, DRAW_SLOTS);
    clearLootZones();
    placeCards(drawn);
    updateDeckCount();
    cardSelected = false;
  });

  loadDeck();

  /* ═══════════════════════════════════════════
     PLAYER BOARD
  ═══════════════════════════════════════════ */

  const TRACKS = [
    { id: 'food',     label: 'Food',     icon: '🌾', defaultValue: 5 },
    { id: 'health',   label: 'Health',   icon: '🩸', defaultValue: 7 },
    { id: 'sanity',   label: 'Sanity',   icon: '🕯️', defaultValue: 6 },
    { id: 'mutation', label: 'Mutation', icon: '🧬', defaultValue: 1 },
  ];

  const SPACES = 10;

  function getStrength(health) {
    if (health === 10) return 3;
    if (health >= 7)   return 2;
    if (health > 2)    return 1;
    return 0;
  }

  function getBand(health) {
    if (health === 10) return 3;
    if (health >= 7)   return 2;
    if (health > 2)    return 1;
    return 0;
  }

  function getSpeed(sanity) {
    if (sanity === 10) return 2;
    if (sanity > 5)    return 1;
    if (sanity > 1)    return 0;
    if (sanity === 1)  return 2;
    return 0;
  }

  function getSpeedBand(sanity) {
    if (sanity === 10) return 'top2';
    if (sanity > 5)    return 'mid1';
    if (sanity > 1)    return 'low0';
    if (sanity === 1)  return 'frenzy';
    return 'skull';
  }

  function buildStatSidebar(wrapper, statId, label, getCellConfig) {
    const group = document.createElement('div');
    group.className = 'track-group';
    group.appendChild(wrapper);

    const sidebar = document.createElement('div');
    sidebar.className = 'stat-sidebar';

    const spacer = document.createElement('div');
    spacer.className = 'stat-spacer';
    sidebar.appendChild(spacer);

    const hdr = document.createElement('div');
    hdr.className = 'stat-header';
    hdr.textContent = label;
    sidebar.appendChild(hdr);

    const cellsEl = document.createElement('div');
    cellsEl.className = 'stat-cells';

    const statCells = [];
    let prevBand = null;
    for (let i = SPACES; i >= 0; i--) {
      const { val, band, isSkull, isFrenzy } = getCellConfig(i);
      const cell = document.createElement('div');
      cell.className = 'stat-cell';
      cell.setAttribute('data-stat-id', statId);
      cell.setAttribute('data-val', val);
      if (band !== prevBand) { cell.classList.add('band-start'); prevBand = band; }
      if (isSkull)  cell.classList.add('skull-row');
      if (isFrenzy) cell.classList.add('frenzy');
      if (!isSkull) {
        const span = document.createElement('span');
        span.className = 'stat-value';
        span.textContent = val;
        cell.appendChild(span);
      }
      statCells.push({ el: cell, trackVal: i });
      cellsEl.appendChild(cell);
    }

    sidebar.appendChild(cellsEl);
    group.appendChild(sidebar);

    return {
      group,
      renderStat(trackVal) {
        statCells.forEach(({ el, trackVal: tv }) => el.classList.toggle('active-stat', tv === trackVal));
      }
    };
  }

  function buildTrack(track) {
    const state = { value: track.defaultValue };

    // Register the setter in playerState so gather board can apply effects
    playerState[track.id].value = state.value;
    playerState[track.id].set = (newVal) => {
      state.value = newVal;
      playerState[track.id].value = newVal;
      render();
    };

    const wrapper = document.createElement('div');
    wrapper.className = 'track-wrapper';
    wrapper.setAttribute('data-track', track.id);

    const labelTop = document.createElement('div');
    labelTop.className = 'track-label';
    labelTop.innerHTML = `<span class="track-icon">${track.icon}</span>`;
    wrapper.appendChild(labelTop);

    const isMutation = track.id === 'mutation';
    const MUTATION_SKULL = 10;
    const MUTATION_CARDS = new Set([4, 9]);

    const trackEl = document.createElement('div');
    trackEl.className = 'track';

    const displayOrder = [];
    if (isMutation) { for (let i = 0; i <= SPACES; i++) displayOrder.push(i); }
    else            { for (let i = SPACES; i >= 0; i--) displayOrder.push(i); }

    const spaces = [];
    for (const i of displayOrder) {
      const isSkull = isMutation ? (i === MUTATION_SKULL) : (i === 0);
      const isCard  = isMutation && MUTATION_CARDS.has(i);

      const space = document.createElement('div');
      space.className = 'track-space' + (isSkull ? ' skull-space' : '') + (isCard ? ' card-space' : '');

      if (isSkull) {
        const skull = document.createElement('span');
        skull.className = 'skull-icon';
        // Food track skull: show what happens at 0 (starvation = health + sanity loss)
        if (track.id === 'food') {
          skull.innerHTML = '<span>🩸</span><span>🕯️</span>';
          skull.title = 'Starvation: −1 health, −1 sanity';
        } else {
          skull.textContent = '☠';
        }
        space.appendChild(skull);
      } else {
        const num = document.createElement('span');
        num.className = 'space-num';
        num.textContent = i;
        space.appendChild(num);
      }

      if (isCard) {
        const cardEl = document.createElement('span');
        cardEl.className = 'card-icon';
        cardEl.textContent = '🃏';
        space.appendChild(cardEl);
      }

      space.addEventListener('click', () => {
        state.value = i;
        playerState[track.id].value = i;
        render();
      });
      spaces.push({ el: space, val: i });
      trackEl.appendChild(space);
    }

    wrapper.appendChild(trackEl);

    const labelBottom = document.createElement('div');
    labelBottom.className = 'track-label';
    labelBottom.textContent = track.label;
    wrapper.appendChild(labelBottom);

    const marker = document.createElement('div');
    marker.className = 'marker';

    let renderStrength = () => {};
    let renderSpeed    = () => {};

    function render() {
      spaces.forEach(({ el, val }) => {
        const active = val === state.value;
        el.classList.toggle('has-marker', active);
        if (active) el.appendChild(marker);
      });
      if (track.id === 'health') renderStrength(state.value);
      if (track.id === 'sanity') renderSpeed(state.value);
    }

    render();

    if (track.id === 'health') {
      const group = document.createElement('div');
      group.className = 'health-track-group';
      group.appendChild(wrapper);

      const sidebar = document.createElement('div');
      sidebar.className = 'strength-sidebar';
      const spacer = document.createElement('div');
      spacer.className = 'strength-spacer';
      sidebar.appendChild(spacer);
      const hdr = document.createElement('div');
      hdr.className = 'strength-header';
      hdr.textContent = 'STR';
      sidebar.appendChild(hdr);
      const cellsEl = document.createElement('div');
      cellsEl.className = 'strength-cells';
      const strCells = [];
      for (let i = SPACES; i >= 0; i--) {
        const cell = document.createElement('div');
        cell.className = 'strength-cell';
        const str = getStrength(i);
        cell.setAttribute('data-str', str);
        const bandAbove = (i < SPACES) ? getBand(i + 1) : -1;
        if (getBand(i) !== bandAbove) cell.classList.add('band-start');
        if (i === 0) {
          cell.classList.add('skull-row');
        } else {
          const v = document.createElement('span');
          v.className = 'str-value';
          v.textContent = str;
          cell.appendChild(v);
        }
        strCells.push({ el: cell, health: i });
        cellsEl.appendChild(cell);
      }
      sidebar.appendChild(cellsEl);
      group.appendChild(sidebar);
      renderStrength = function(healthVal) {
        strCells.forEach(({ el, health }) => el.classList.toggle('active-str', health === healthVal));
      };
      renderStrength(state.value);
      return group;
    }

    if (track.id === 'sanity') {
      const { group, renderStat } = buildStatSidebar(wrapper, 'spd', 'SPD', (i) => ({
        val:      getSpeed(i),
        band:     getSpeedBand(i),
        isSkull:  i === 0,
        isFrenzy: getSpeedBand(i) === 'frenzy',
      }));
      renderSpeed = renderStat;
      renderSpeed(state.value);
      return group;
    }

    return wrapper;
  }

  const tracksContainer = document.getElementById('tracks-container');
  TRACKS.forEach(t => tracksContainer.appendChild(buildTrack(t)));

  loadThreatDeck();
</script>
</body>
</html>
